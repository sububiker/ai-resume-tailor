name: Build and Deploy to Kubernetes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t ai-resume-backend:local ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg BACKEND_URL=http://ai-resume-backend-svc:8000 \
            -t ai-resume-frontend:local \
            ./frontend

      - name: Set up kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ai-resume-cluster

      - name: Load images into kind
        run: |
          kind load docker-image ai-resume-backend:local --name ai-resume-cluster
          kind load docker-image ai-resume-frontend:local --name ai-resume-cluster

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create Anthropic API secret
        run: |
          kubectl create secret generic anthropic-secret \
            --from-literal=api-key=${{ secrets.ANTHROPIC_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-resume ./charts/ai-resume \
            --wait \
            --timeout 120s

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
          kubectl rollout status deployment/ai-resume-backend
          kubectl rollout status deployment/ai-resume-frontend
